name: Release Anjal
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        include:
          - os: ubuntu-22.04
            artifact_name: anjal-linux-amd64
            wails_platform: linux/amd64
          - os: macos-latest
            artifact_name: anjal-macos.app
            wails_platform: darwin/universal
          - os: windows-latest
            artifact_name: anjal-windows.exe
            wails_platform: windows/amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build TUI (All Platforms)
        run: go build -o anjal-cli${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/anjal

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        working-directory: gui
        run: |
          # 1. Build GUI App Bundle
          wails build -platform darwin/universal
          
          # 2. Build TUI CLI
          cd ..
          go build -o anjal-cli ./cmd/anjal
          
          # 3. Create DMG
          npm install -g appdmg
          appdmg appdmg.json Anjal-macOS.dmg

      - name: Build GUI (Linux/Windows)
        if: runner.os != 'macOS'
        working-directory: gui
        run: |
          wails build -platform ${{ matrix.wails_platform }}

      - name: Package Windows NSIS Installer
        if: runner.os == 'Windows'
        working-directory: gui
        run: wails build -nsis

      - name: Package Linux (AppImage, DEB, RPM)
        if: runner.os == 'Linux'
        run: |
          # 1. Install fpm for deb/rpm
          sudo gem install fpm
          
          # Get version from tag or use fallback
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$VERSION" == "refs/"* ]]; then VERSION="1.0.0"; fi
          
          # 2. Build DEB and RPM
          fpm -s dir -t deb -n anjal -v "$VERSION" -p Anjal-Linux_${VERSION}_amd64.deb \
            gui/build/bin/anjal=/usr/bin/anjal \
            anjal-cli=/usr/bin/anjal-cli \
            anjal.desktop=/usr/share/applications/anjal.desktop \
            gui/build/appicon.png=/usr/share/icons/hicolor/256x256/apps/anjal.png
            
          fpm -s dir -t rpm -n anjal -v "$VERSION" -p Anjal-Linux_${VERSION}_x86_64.rpm \
            gui/build/bin/anjal=/usr/bin/anjal \
            anjal-cli=/usr/bin/anjal-cli \
            anjal.desktop=/usr/share/applications/anjal.desktop \
            gui/build/appicon.png=/usr/share/icons/hicolor/256x256/apps/anjal.png

          # 3. Build AppImage
          wget -qO appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          
          mkdir -p AppDir/usr/bin
          cp gui/build/bin/anjal AppDir/usr/bin/
          cp anjal-cli AppDir/usr/bin/
          cp anjal.desktop AppDir/
          cp gui/build/appicon.png AppDir/anjal.png
          
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/anjal" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          ./appimagetool --appimage-extract-and-run AppDir Anjal-Linux-x86_64.AppImage

      - name: Upload GUI Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            gui/build/bin/
            anjal-cli*
            Anjal-macOS.dmg
            *.AppImage
            *.deb
            *.rpm
            !gui/build/bin/**/*.txt

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
